version: '3.4'

services: 
  stock-api:
    image: stockmanagementapi:dev
    container_name: StockManagement.API
    ports:
      - "5000:8080" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=dockerserver;your connection strings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    restart: always

  stock-webui:
    image: stockmanagementwebui:dev
    container_name: StockManagement.WebUI
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiSettings__BaseUrl=http://stock-api:8080
    depends_on:
      - stock-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always